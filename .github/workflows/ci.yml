name: ci

on:
  push:
  workflow_dispatch:

permissions: {}

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0

      - name: Install pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0

      - name: Install dependencies
        run: pnpm install

      - name: Compile
        run: pnpm build

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0

      - name: Install pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0

      - name: Install dependencies
        run: pnpm install

      - name: Test
        run: pnpm test

  build-artifact:
    needs: [compile, test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0

      - name: Install pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Pack tarball and checksum
        run: |
          mkdir -p artifact
          npm pack --pack-destination artifact
          (cd artifact && sha256sum *.tgz > SHA256SUMS)

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package
          path: artifact
          if-no-files-found: error
          retention-days: 7

  tag:
    needs: [compile, test, build-artifact]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify bundled OpenAPI spec
        # Run before tag creation so a missing/stale spec doesn't leave a
        # ghost release (tag exists, npm publish skipped on retry because
        # the tag-existence check sets should_publish=false).
        uses: PhenoML/sdk-shared-actions/verify-openapi-spec@1.0.0

      - name: Extract version and check tag
        id: check
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q .; then
            echo "Tag $VERSION already exists, skipping"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and GitHub release
        if: steps.check.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.check.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "${{ steps.check.outputs.version }}" \
            --generate-notes

  publish:
    needs: [compile, test, build-artifact, tag]
    if: needs.tag.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment: npm-production
    permissions:
      contents: read
      id-token: write

    steps:
      # Node 24 ships npm >= 11.5, which supports OIDC Trusted Publishing
      # without npx -y npm@latest (avoids running install scripts in the
      # same job as the OIDC credential).
      - name: Set up node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: "https://registry.npmjs.org"

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package
          path: artifact

      - name: Verify checksum
        working-directory: artifact
        run: sha256sum -c SHA256SUMS

      - name: Publish to npm
        working-directory: artifact
        run: |
          TARBALL=$(ls *.tgz)
          case "$TARBALL" in
            *alpha*) TAG=alpha ;;
            *beta*)  TAG=beta ;;
            *)       TAG=latest ;;
          esac
          npm publish --access public --tag "$TAG" "$TARBALL"
