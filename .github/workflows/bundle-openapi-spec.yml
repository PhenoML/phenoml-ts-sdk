name: bundle-openapi-spec

# Auto-commits the combined OpenAPI spec for the SDK's source commit into
# Fern-generated PRs. Delegates the fetch + commit/push to the shared
# composite action; this workflow only owns trigger config, permissions,
# the fork guard, and the PR-branch checkout.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".fern/metadata.json"
      - ".github/workflows/bundle-openapi-spec.yml"

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Fork PRs can't push back to the head branch and we don't want to leak
    # tokens to forked code. Fern's bot opens PRs from same-repo branches,
    # so this only excludes the (currently unused) fork path.
    if: github.event.pull_request.head.repo.full_name == github.repository

    env:
      # Quoted indirection: keeps untrusted ref values out of inline ${{ }}
      # shell expansions per GitHub's workflow-injection guidance.
      HEAD_REF: ${{ github.event.pull_request.head.ref }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.HEAD_REF }}

      - name: Bundle OpenAPI spec
        uses: PhenoML/sdk-shared-actions/bundle-openapi-spec@main
